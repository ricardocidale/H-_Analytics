# Local development environment — mirrors the GitHub Actions CI setup exactly.
# PostgreSQL 16 + pgvector extension + MinIO (S3-compatible local object storage).
#
# Usage:
#   docker compose up -d        # start services in background
#   docker compose down         # stop and remove containers (data preserved)
#   docker compose down -v      # stop and wipe all volumes (full reset)
#
# After starting, run: scripts/setup-local.sh
# Then: npm run dev:local

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hanalytics
      POSTGRES_PASSWORD: hanalytics
      POSTGRES_DB: hanalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanalytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer — runs once to create the default bucket
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/hanalytics &&
        mc anonymous set download local/hanalytics/public
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
