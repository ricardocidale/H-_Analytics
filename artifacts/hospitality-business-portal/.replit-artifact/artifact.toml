kind = "web"
previewPath = "/"
title = "H+ Analytics"
version = "1.0.0"
id = "artifacts/hospitality-business-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23312

[services.development]
run = "bash ../../scripts/print-opmode-banner.sh; pnpm --filter @workspace/hospitality-business-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospitality-business-portal", "run", "build" ]
publicDir = "artifacts/hospitality-business-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23312"
BASE_PATH = "/"
