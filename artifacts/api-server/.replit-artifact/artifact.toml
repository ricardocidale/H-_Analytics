kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash ../../scripts/print-opmode-banner.sh; pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production.
# `--import .../instrument.mjs` runs Sentry.init() BEFORE express is loaded so
# OpenTelemetry can wrap it (otherwise: `[Sentry] express is not instrumented`
# on every boot and HTTP spans are silently dropped). See src/instrument.ts.
args = [
  "node",
  "--enable-source-maps",
  "--import",
  "./artifacts/api-server/dist/instrument.mjs",
  "artifacts/api-server/dist/index.mjs",
]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health/live"
