kind = "design"
previewPath = "/__mockup/"
title = "Mockup Sandbox"
version = "1.0.0"
id = "artifacts/mockup-sandbox"
router = "path"

[[integratedSkills]]
name = "mockup-sandbox"
version = "1.0.0"

[[services]]
name = "Component Preview Server"
paths = [ "/__mockup/" ]
localPort = 23636

[services.development]
run = "npm run dev"

# Mockup Sandbox is a development-only design tool — never deployed.
# `production = false` excludes this artifact from the publish manifest so the
# Replit publish step does not try to build/serve it. The publish manifest
# only includes api-server + hospitality-business-portal + property-slides.
[services.production]
production = false

[services.env]
PORT = "23636"
BASE_PATH = "/__mockup/"
