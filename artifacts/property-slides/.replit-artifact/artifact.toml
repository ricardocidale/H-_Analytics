kind = "slides"
previewPath = "/property-slides/"
title = "L+B Property Slides"
version = "1.0.0"
id = "artifacts/property-slides"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/property-slides/" ]
localPort = 23636

[services.development]
run = "pnpm --filter @workspace/property-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/property-slides", "run", "build" ]
publicDir = "artifacts/property-slides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23636"
BASE_PATH = "/property-slides/"
