name: Vector Bench (OpenAI embeddings)

permissions:
  contents: read

# Runs the pgvector / HNSW latency benchmark with *real* text-embedding-3-small
# vectors. The sister workflow `vector-bench.yml` runs the same benchmark with
# random unit vectors — useful for spotting index-config regressions but not
# representative of the embedding distribution we see in production.
# This job is opt-in: it only runs on a schedule (or manual dispatch) and only
# if the OPENAI_API_KEY repository secret is configured. Results are labelled
# with the embedding source so they're not compared like-for-like against the
# random-vector runs.

on:
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      sizes:
        description: "Comma-separated chunk counts to seed (smaller is cheaper)."
        required: false
        default: "1000,10000"
      queries:
        description: "Queries per size."
        required: false
        default: "50"
      min_recall:
        description: "Fail the run if any size's mean OR worst-decile (p5) recall@K falls below this fraction (0..1). 0 disables."
        required: false
        default: "0.85"
      warn_recall:
        description: "Surface a recall warning (without failing) when any size sits between this and min_recall. 0 disables."
        required: false
        default: "0.90"

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://bench:bench@localhost:5432/vector_bench
      NODE_ENV: test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SIZES: ${{ github.event.inputs.sizes || '1000,10000' }}
      QUERIES: ${{ github.event.inputs.queries || '50' }}
      # Task #568 — fail the run when HNSW recall against brute-force regresses.
      # 0.85 mean recall@8 is the floor we've seen on stable HNSW configs over
      # the last quarter; anything lower is a config regression worth blocking.
      MIN_RECALL: ${{ github.event.inputs.min_recall || '0.85' }}
      WARN_RECALL: ${{ github.event.inputs.warn_recall || '0.90' }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bench
          POSTGRES_PASSWORD: bench
          POSTGRES_DB: vector_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bench"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Skip if OPENAI_API_KEY is not configured
        id: keycheck
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is not set; skipping OpenAI vector bench."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.keycheck.outputs.skip == 'false'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.keycheck.outputs.skip == 'false'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.keycheck.outputs.skip == 'false'
        run: npm install

      - name: Apply database schema
        if: steps.keycheck.outputs.skip == 'false'
        run: npm run db:push -- --force

      - name: Run vector benchmark (OpenAI embeddings)
        if: steps.keycheck.outputs.skip == 'false'
        run: |
          set -o pipefail
          mkdir -p artifacts
          npx tsx script/vector-bench.ts \
            --embed-source=openai \
            --sizes="${SIZES}" \
            --queries="${QUERIES}" \
            --min-recall="${MIN_RECALL}" \
            --warn-recall="${WARN_RECALL}" \
            --append-docs \
            --json-out=artifacts/vector-bench-openai.json \
            2>&1 | tee artifacts/vector-bench-openai.log

      - name: Write GitHub job summary
        if: always() && steps.keycheck.outputs.skip == 'false'
        run: |
          {
            echo "## Vector Benchmark (OpenAI embeddings)"
            echo ""
            echo "Sizes: \`${SIZES}\`  |  Queries: \`${QUERIES}\`  |  Embedding source: \`openai\` (text-embedding-3-small)"
            echo "Recall gates: min=\`${MIN_RECALL}\`  warn=\`${WARN_RECALL}\`"
            echo ""
            if [ -f artifacts/vector-bench-openai.json ]; then
              # Surface threshold breaches at the very top of the summary so a
              # regression is visible from the workflow run page without
              # scrolling through the JSON or hunting through logs. Task #568.
              node -e '
                const fs = require("fs");
                const o = JSON.parse(fs.readFileSync("artifacts/vector-bench-openai.json", "utf8"));
                const failed = Array.isArray(o.failed) ? o.failed : [];
                const warned = Array.isArray(o.warned) ? o.warned : [];
                if (failed.length > 0) {
                  console.log("### Threshold FAILURES");
                  console.log("");
                  for (const m of failed) console.log("- " + m);
                  console.log("");
                }
                if (warned.length > 0) {
                  console.log("### Threshold warnings");
                  console.log("");
                  for (const m of warned) console.log("- " + m);
                  console.log("");
                }
                if (failed.length === 0 && warned.length === 0) {
                  console.log("All latency and recall gates passed.");
                  console.log("");
                }
              '
              # Pull recall@K out of the JSON summary so a regression in HNSW
              # quality is visible at a glance from the workflow run page —
              # not just buried in the log or the markdown history file.
              echo "### Recall@K (HNSW vs brute-force sequential scan)"
              echo ""
              echo "| size | total rows | top-K | queries | recall mean | recall p5 | recall min |"
              echo "| ---: | ---------: | ----: | ------: | ----------: | --------: | ---------: |"
              node -e '
                const fs = require("fs");
                const o = JSON.parse(fs.readFileSync("artifacts/vector-bench-openai.json", "utf8"));
                const pct = (f) => (f == null ? "n/a" : (f * 100).toFixed(1) + "%");
                for (const r of (o.results || [])) {
                  const rec = r.recall;
                  const k = rec ? rec.topK : (o.topK || "");
                  const q = rec ? rec.count : (o.queries || "");
                  console.log(`| ${r.size.toLocaleString()} | ${r.totalRowsAtRun.toLocaleString()} | ${k} | ${q} | ${pct(rec && rec.meanAtK)} | ${pct(rec && rec.p5AtK)} | ${pct(rec && rec.minAtK)} |`);
                }
              '
              echo ""
              echo "### Latency + raw JSON"
              echo ""
              echo '```json'
              cat artifacts/vector-bench-openai.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always() && steps.keycheck.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: vector-bench-openai-${{ github.run_id }}
          path: |
            artifacts/vector-bench-openai.json
            artifacts/vector-bench-openai.log
            docs/vector-bench-results.md
          retention-days: 90
