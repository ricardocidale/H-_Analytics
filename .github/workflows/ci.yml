name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck + Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (catches duplicate switch cases and other ESLint errors)
        run: pnpm run check:lint

      - name: Magic numbers gate
        run: pnpm --filter @workspace/scripts run check:magic-numbers

      - name: Migration guards gate
        run: pnpm --filter @workspace/scripts run check:migration-guards

      - name: Schema drift gate
        run: pnpm --filter @workspace/scripts run check:schema-drift

      - name: Analyst copy guard (casual-register rule)
        run: pnpm --filter @workspace/scripts run check:analyst-copy

  unit-tests:
    name: Unit Tests (calc + engine)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: calc tests
        run: pnpm --filter @workspace/calc run test

      - name: scripts tests
        run: pnpm --filter @workspace/scripts run test

  portal-tests:
    name: Portal Tests (layout + component contracts)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: portal tests (incl. narrow-layout squeeze guard)
        run: pnpm --filter @workspace/hospitality-business-portal run test

  layout-tests:
    name: Layout Tests (Playwright 768px narrow-layout)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @workspace/tests-layout exec playwright install --with-deps chromium

      - name: Narrow-layout Playwright tests (768px chip-width regression)
        run: pnpm --filter @workspace/tests-layout run test
