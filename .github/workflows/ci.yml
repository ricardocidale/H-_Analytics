name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck + Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (catches duplicate switch cases and other ESLint errors)
        run: pnpm run check:lint

      - name: Magic numbers gate
        run: pnpm --filter @workspace/scripts run check:magic-numbers

      - name: Migration guards gate
        run: pnpm --filter @workspace/scripts run check:migration-guards

      - name: Schema drift gate
        run: pnpm --filter @workspace/scripts run check:schema-drift

  unit-tests:
    name: Unit Tests (calc + engine)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: calc tests
        run: pnpm --filter @workspace/calc run test

      - name: scripts tests
        run: pnpm --filter @workspace/scripts run test
