name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: ESLint (bug guards across calc/engine/server/shared/client)
        run: npm run lint:strict

      - name: TypeScript
        run: npm run check

      - name: Quick Audit
        run: npm run audit:quick

  test-and-verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hbg_test
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hbg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep (needed by audit tests)
        run: sudo apt-get install -y ripgrep

      - run: npm install

      - name: Run Tests
        run: npm run test:summary

      - name: Verify Financials
        run: npm run verify:summary
