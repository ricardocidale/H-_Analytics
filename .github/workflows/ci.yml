name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default-deny: jobs only get `contents: read`. Any job that needs to
# write (comment on a PR, push a tag, etc.) must opt in explicitly at the
# job level. Closes CodeQL alerts #1–3 (overly permissive GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep (needed by audit:quick deprecated-constants guard)
        run: sudo apt-get install -y ripgrep

      - run: npm install

      - name: ESLint (bug guards across calc/engine/server/shared/client)
        run: npm run lint:strict

      - name: TypeScript
        run: npm run check

      - name: Quick Audit
        # Includes the legacy-storage-URL guardrail (Task #524) which
        # fails the build at PR time if any non-allowlisted file in
        # server/, shared/, client/, or script/ hard-codes a legacy
        # storage host (storage.googleapis.com, objectstorage.replit.com,
        # *.repl.co/objects) or sidecar bucket path (/objects/uploads/).
        # New writes must use the relative `/objects/<key>` form.
        run: npm run audit:quick

      - name: Replit Independence Guardrail
        # Fails if any new direct `@replit/`, `process.env.REPL*`, or
        # `replit.dev` / `replit.app` reference lands outside the
        # allow-listed locations (server/replit_integrations/,
        # server/providers/, vite.config.ts, vite-plugin-meta-images.ts).
        run: npx tsx script/check-replit-independence.ts

  test-and-verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hbg_test
      NODE_ENV: test
      # Dummy key so eager `new OpenAI({ apiKey })` constructors at module
      # load (e.g. server/replit_integrations/image/client.ts) don't throw
      # during test-file imports. No real API calls are made — every test
      # that exercises an OpenAI/Anthropic/Gemini call mocks the client.
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-test-ci-dummy-not-a-real-key
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hbg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep (needed by audit tests)
        run: sudo apt-get install -y ripgrep

      - run: npm install

      - name: Push Drizzle schema to test Postgres
        # Real-DB tests (tests/db/*.integration.test.ts, admin-resources, etc.)
        # query a fully-migrated schema. Without this step they fail because
        # the postgres service container starts empty.
        run: npm run db:push -- --force

      - name: Seed model_defaults from shared/constants.ts
        # tests/proof/defaults-drift.test.ts expects every spec in
        # script/seed-model-defaults.ts to be present in the DB. This is the
        # same one-liner the test's failure message instructs you to run.
        run: npx tsx script/seed-model-defaults.ts

      - name: Run Tests
        run: npm run test:summary

      - name: Read-only admin tabs browser tests (Phase 4 doctrine)
        # Re-runs the read-only-doctrine browser tests as one named CI
        # step so a regression that ships an editable input on any of
        # the covered admin tabs fails this clearly-labeled check on
        # the PR — instead of being buried inside the generic "Run
        # Tests" output. Each tab's specialist-owned surfaces (the
        # whole Constants tab, plus any `section-model-constants-*` /
        # `*-readonly` band on Property Underwriting, Market & Macro,
        # and Management Company) are scanned for editable elements at
        # render time. Tests are also part of `npm test`, so this step
        # is redundant on green and informational on red.
        run: |
          npx vitest run \
            tests/client/model-constants-tab-browser.test.tsx \
            tests/client/model-constants-tab-readonly.test.tsx \
            tests/client/property-underwriting-readonly-band-browser.test.tsx \
            tests/client/market-macro-readonly-band-browser.test.tsx \
            tests/client/company-readonly-band-browser.test.tsx

      - name: Verify Financials
        run: npm run verify:summary
