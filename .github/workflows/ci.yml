name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default-deny: jobs only get `contents: read`. Any job that needs to
# write (comment on a PR, push a tag, etc.) must opt in explicitly at the
# job level. Closes CodeQL alerts #1–3 (overly permissive GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install ripgrep (needed by audit:quick deprecated-constants guard)
        run: sudo apt-get install -y ripgrep

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: ESLint (bug guards across calc/engine/server/shared/client)
        run: pnpm run lint:strict

      - name: TypeScript
        run: pnpm run check

      - name: Quick Audit
        # Includes the legacy-storage-URL guardrail (Task #524) which
        # fails the build at PR time if any non-allowlisted file in
        # server/, shared/, client/, or script/ hard-codes a legacy
        # storage host (storage.googleapis.com, objectstorage.replit.com,
        # *.repl.co/objects) or sidecar bucket path (/objects/uploads/).
        # New writes must use the relative `/objects/<key>` form.
        run: pnpm run audit:quick

      - name: Replit Independence Guardrail
        # Fails if any new direct `@replit/`, `process.env.REPL*`, or
        # `replit.dev` / `replit.app` reference lands outside the
        # allow-listed locations (server/replit_integrations/,
        # server/providers/, vite.config.ts, vite-plugin-meta-images.ts).
        run: npx tsx script/check-replit-independence.ts

  test-and-verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hbg_test
      NODE_ENV: test
      # Dummy key so eager `new OpenAI({ apiKey })` constructors at module
      # load (e.g. server/replit_integrations/image/client.ts) don't throw
      # during test-file imports. No real API calls are made — every test
      # that exercises an OpenAI/Anthropic/Gemini call mocks the client.
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-test-ci-dummy-not-a-real-key
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hbg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install ripgrep (needed by audit tests)
        run: sudo apt-get install -y ripgrep

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Enable pgvector extension on test Postgres
        # The pgvector/pgvector:pg16 service container ships the binary but
        # the extension is per-database and must be CREATEd before drizzle-kit
        # encounters any `vector(...)` column type (shared/schema/vector-chunks.ts).
        # Without this, db:push aborts with `type "vector" does not exist`,
        # leaving the test schema partially or fully empty and breaking every
        # real-DB test downstream.
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U ci -d hbg_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Push Drizzle schema to test Postgres
        # Real-DB tests (tests/db/*.integration.test.ts, admin-resources, etc.)
        # query a fully-migrated schema. Without this step they fail because
        # the postgres service container starts empty.
        run: pnpm run db:push --force

      - name: Seed model_defaults from shared/constants.ts
        # tests/proof/defaults-drift.test.ts expects every spec in
        # script/seed-model-defaults.ts to be present in the DB. This is the
        # same one-liner the test's failure message instructs you to run.
        run: npx tsx script/seed-model-defaults.ts

      - name: Run Tests
        run: pnpm run test:summary

      - name: Read-only admin tabs browser tests (Phase 4 doctrine)
        # Re-runs the read-only-doctrine browser tests as one named CI
        # step so a regression that ships an editable input on any of
        # the covered admin tabs fails this clearly-labeled check on
        # the PR — instead of being buried inside the generic "Run
        # Tests" output. Each tab's specialist-owned surfaces (the
        # whole Constants tab, plus any `section-model-constants-*` /
        # `*-readonly` band on Property Underwriting, Market & Macro,
        # and Management Company) are scanned for editable elements at
        # render time. Tests are also part of `npm test`, so this step
        # is redundant on green and informational on red.
        run: |
          npx vitest run \
            tests/client/model-constants-tab-browser.test.tsx \
            tests/client/model-constants-tab-readonly.test.tsx \
            tests/client/property-underwriting-readonly-band-browser.test.tsx \
            tests/client/market-macro-readonly-band-browser.test.tsx \
            tests/client/company-readonly-band-browser.test.tsx

      - name: Verify Financials
        run: pnpm run verify:summary

  schema-sync-non-interactive:
    # Task #715 — proves `npm run db:push` keeps running cleanly in
    # non-TTY environments (CI, Replit Agent loops, scripted setups,
    # cold-boot deploys). The `test-and-verify` job above runs
    # `db:push -- --force`, which auto-accepts destructive prompts —
    # exactly the failure mode this gate is designed to catch.
    #
    # If a future schema change introduces a transition that
    # drizzle-kit can't apply without asking the operator (e.g. a
    # column rename it can't auto-detect, a UNIQUE constraint that
    # would require a destructive truncate, an ambiguous column
    # drop), drizzle-kit will either:
    #   - block on stdin (this job kills it via `timeout`), or
    #   - detect non-TTY and bail out non-zero.
    # Either path fails this step on the PR with a clear, named
    # signal — instead of the regression escaping to the next manual
    # `npm run db:push` against a real environment.
    #
    # When this gate fails, follow the Task #573 pattern:
    #   1. Add a one-time, idempotent migration in
    #      `server/migrations/` that transforms the data so
    #      drizzle-kit can apply the new constraint cleanly.
    #   2. Register it in the `runMigrations()` block in
    #      `server/index.ts` (search for "assumption_guidance_dedupe"
    #      for the canonical example).
    #   3. Re-run locally with the same invocation this job uses
    #      (note: `shared/db-url.ts` reads POSTGRES_URL first, so
    #      clear it locally or you'll target your real Postgres
    #      instead of the disposable one):
    #         env -u POSTGRES_URL DATABASE_URL=postgresql://ci:ci@localhost:5432/hbg_schema_sync \
    #           timeout 120 npm run db:push < /dev/null
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      # Explicitly clear POSTGRES_URL — `shared/db-url.ts` reads it
      # before DATABASE_URL, so a repo-level POSTGRES_URL secret/var
      # would otherwise silently redirect this job at a real
      # database (the failure mode that originally motivated Task
      # #573 and this gate).
      POSTGRES_URL: ""
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hbg_schema_sync
      NODE_ENV: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hbg_schema_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension on disposable Postgres
        # Mirrors the test-and-verify setup — drizzle-kit needs the
        # `vector` extension before it encounters any vector(...)
        # column type (shared/schema/vector-chunks.ts), otherwise
        # db:push aborts with `type "vector" does not exist`, which
        # would mask any real prompt-related regression.
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U ci -d hbg_schema_sync -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Schema sync stays non-interactive (Task #715)
        # Stdin is closed (`< /dev/null`) and a hard 120s wall-clock
        # cap is applied (`timeout 120`). We deliberately omit the
        # `--force` flag the test-and-verify job uses, so any
        # destructive prompt fails this job instead of being silently
        # accepted.
        run: timeout 120 pnpm run db:push < /dev/null
