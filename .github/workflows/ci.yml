name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default-deny: jobs only get `contents: read`. Any job that needs to
# write (comment on a PR, push a tag, etc.) must opt in explicitly at the
# job level. Closes CodeQL alerts #1–3 (overly permissive GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep (needed by audit:quick deprecated-constants guard)
        run: sudo apt-get install -y ripgrep

      - run: npm install

      - name: ESLint (bug guards across calc/engine/server/shared/client)
        run: npm run lint:strict

      - name: TypeScript
        run: npm run check

      - name: Quick Audit
        run: npm run audit:quick

      - name: Replit Independence Guardrail
        # Fails if any new direct `@replit/`, `process.env.REPL*`, or
        # `replit.dev` / `replit.app` reference lands outside the
        # allow-listed locations (server/replit_integrations/,
        # server/providers/, vite.config.ts, vite-plugin-meta-images.ts).
        run: npx tsx script/check-replit-independence.ts

  test-and-verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hbg_test
      NODE_ENV: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hbg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep (needed by audit tests)
        run: sudo apt-get install -y ripgrep

      - run: npm install

      - name: Run Tests
        run: npm run test:summary

      - name: Constants tab read-only browser test (Phase 4 doctrine)
        # Re-runs the model-constants browser test as its own named
        # CI step so a regression that ships an editable input on the
        # admin Constants tab fails this clearly-labeled check on the
        # PR — instead of being buried inside the generic "Run Tests"
        # output. The test itself is also part of `npm test`, so this
        # step is redundant on green and informational on red.
        run: npx vitest run tests/client/model-constants-tab-browser.test.tsx tests/client/model-constants-tab-readonly.test.tsx

      - name: Verify Financials
        run: npm run verify:summary
