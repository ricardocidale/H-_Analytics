name: Storage Reconcile Auto-Remediate

# Scheduled auto-remediation for the routine, mechanically-fixable failure
# modes of the pre-deploy storage reconcile gate (Task #522 →
# `.github/workflows/predeploy-storage-reconcile.yml`).
#
# The read-only gate fails any push to `main` that introduces a `MISSING-R2`
# or `LEGACY-host` finding. Both are mechanically remediable by the SAME
# script in mutating mode — the gate just refuses to do it on the deploy
# path so "is main deployable right now" stays a pure read-only signal.
#
# This workflow runs the script in mutating mode on a schedule (nightly,
# 09:00 UTC) and on manual `workflow_dispatch`, so routine drift gets swept
# automatically instead of waking up an operator. Specifically:
#
#   1. `--rewrite-legacy-hosts` rewrites any cell holding
#      `https://<replit-host>/objects/<key>` to the relative `/objects/<key>`
#      form. Idempotent. Non-rewritable shapes (e.g. GCS-direct URLs) are
#      reported as SKIPPED and require manual remediation.
#   2. `--copy-from-replit-bucket` re-fetches any `/objects/<key>` URL that
#      is missing from R2 from the legacy Replit bucket via
#      `ReplitStorageProvider` and uploads it to R2 at the same key. The
#      script chains these flags so a single invocation re-classifies the
#      rewritten cells as `missing-r2` and then copies them across, then
#      re-verifies — the script's `[RE-CLASSIFY]` and `[RE-VERIFY]` passes
#      handle this internally.
#
# This does NOT run on every commit. The read-only deploy gate stays the
# source of truth for "is main deployable right now"; this workflow is the
# janitor that keeps drift from accumulating to the point where the gate
# trips. Failures here do NOT block deploys (nothing depends on it as a
# required check) — they surface in the job summary and the workflow's run
# log so an operator can investigate the next morning.
#
# Auditability: every run uploads the full reconciler stdout as an artifact
# (`r2-cutover-remediate-<run-id>.log`) and writes a structured job summary
# listing what was rewritten / copied / skipped / failed, so the mutation
# history is reviewable in the Actions UI without opening a PR. The script
# mutates production Postgres + R2 directly — there is no codebase diff to
# raise a PR against.

on:
  schedule:
    # Nightly at 09:00 UTC. Picked to land *before* the European working day
    # so any failures the operator needs to triage are visible by morning,
    # but *after* the US working day so we're not racing late deploys.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running remediation manually? (logged in the job summary)"
        required: false
        default: "manual remediation sweep"

permissions:
  # `contents: read` for the checkout. `actions: read` so the alerting
  # step can list prior runs of THIS workflow to count consecutive
  # scheduled failures. `issues: write` so it can open / update / close
  # the single tracking issue used to surface a multi-night backlog
  # without spamming a fresh issue every red night.
  contents: read
  actions: read
  issues: write

concurrency:
  # Serialise remediation runs against each other so a manual dispatch
  # during the nightly window doesn't race the scheduler against the same
  # production DB rows + R2 keys.
  group: storage-reconcile-remediate
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0
      NODE_ENV: production
      # The reconciler uses `server/db.ts`, which resolves
      # POSTGRES_URL ?? DATABASE_URL. Production lives on Neon and is read
      # via POSTGRES_URL, so wire that explicitly. Same secret the deploy
      # gate uses.
      POSTGRES_URL: ${{ secrets.PROD_POSTGRES_URL }}
      # Storage adapter env — must match the deployed app exactly so the
      # remediation writes to the same R2 bucket the runtime serves from.
      STORAGE_PROVIDER: r2
      S3_BUCKET: ${{ secrets.R2_BUCKET }}
      S3_REGION: auto
      S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      # Legacy Replit Object Storage env — only consumed by
      # `--copy-from-replit-bucket` via `ReplitStorageProvider`. If unset
      # and there are no `MISSING-R2` keys to copy, the script no-ops that
      # branch. If unset and there ARE missing keys, copies fail loudly and
      # surface in the job summary instead of silently passing.
      PUBLIC_OBJECT_SEARCH_PATHS: ${{ secrets.LEGACY_PUBLIC_OBJECT_SEARCH_PATHS }}
      PRIVATE_OBJECT_DIR: ${{ secrets.LEGACY_PRIVATE_OBJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --ignore-scripts

      - name: Verify required secrets are configured
        # Fail loudly *before* we hit the script, so a missing secret looks
        # like "you forgot to set R2_BUCKET" instead of an opaque AWS SDK
        # error 80 lines deep in a stack trace. Only the R2 + Postgres
        # secrets are required — the legacy Replit bucket env is optional
        # because the `--copy-from-replit-bucket` branch can no-op cleanly.
        run: |
          missing=0
          for var in POSTGRES_URL S3_BUCKET S3_ENDPOINT AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret/env not set: $var"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::Configure the missing GitHub Actions secrets (PROD_POSTGRES_URL, R2_BUCKET, R2_S3_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY) and re-run."
            exit 1
          fi

      - name: Run R2 cutover reconciler (remediate)
        id: remediate
        # GitHub Actions invokes each `run:` block with
        # `bash --noprofile --norc -eo pipefail {0}` by default, which
        # means `set -e` is in force from the outside — a non-zero exit
        # from the reconciler would terminate this step *before* we capture
        # the exit code, defeating the whole point of feeding it to the
        # summary + the final re-assertion step.
        #
        # Disable `-e` around the reconciler invocation, capture the exit
        # code from `${PIPESTATUS[0]}` (the reconciler's, not tee's), then
        # restore strict mode for the rest of the step. The exit code is
        # surfaced via step output so the summary step can include it and
        # the final step can re-assert it to fail the workflow run.
        run: |
          mkdir -p artifacts
          set +e
          npx tsx script/r2-cutover-reconcile.ts \
            --rewrite-legacy-hosts \
            --copy-from-replit-bucket \
            2>&1 | tee artifacts/r2-cutover-remediate.log
          reconciler_exit=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${reconciler_exit}" >> "$GITHUB_OUTPUT"
          echo "Reconciler exited with code ${reconciler_exit}"

      - name: Write GitHub job summary
        if: always()
        # Parse the reconciler's stdout for the human-readable counts so
        # the summary is a single-glance "what happened" artifact, then
        # embed the full log in a collapsed details block for full
        # auditability without making the summary itself unreadable.
        run: |
          {
            echo "## Storage Reconcile Auto-Remediate"
            echo ""
            echo "Trigger: \`${{ github.event_name }}\`  |  Ref: \`${{ github.ref }}\`  |  SHA: \`${{ github.sha }}\`  |  Exit: \`${{ steps.remediate.outputs.exit_code }}\`"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Reason: ${{ github.event.inputs.reason }}"
            fi
            echo ""
            if [ -f artifacts/r2-cutover-remediate.log ]; then
              # Pull every distinct headline-count line the script printed
              # across its passes (initial scan, [RE-CLASSIFY], [RE-VERIFY])
              # in original order, deduped. This shows the full trajectory
              # so the operator can see "started at 4 legacy-host, ended at
              # 1 legacy-host + 1 missing-r2" instead of just the terminal
              # state — the trajectory is what tells you whether the sweep
              # actually moved the needle.
              echo "### Counts (per pass, deduped)"
              echo ""
              echo '```'
              tac artifacts/r2-cutover-remediate.log \
                | awk '/^      (OK|MISSING|LEGACY)/ && !seen[$0]++' \
                | tac \
                || true
              echo '```'
              echo ""
              # Pull the per-action lines so the summary lists exactly what
              # changed (rewrites, copies, skips, failures) without making
              # the operator open the artifact log to find them.
              echo "### Mutations performed"
              echo ""
              echo '```'
              # Match the per-action lines the script emits during the
              # [REWRITE] and [COPY] passes: 2-space-indented `rewrote`,
              # `copy:`, `SKIPPED`, `FAILED`, the trailing `N rewritten,
              # M skipped` / `N copied, M failed` totals, and the
              # 4-space-indented `FAIL` lines from copyLegacyToR2's
              # per-row failure dump.
              grep -E '^( {2}(rewrote|copy:|SKIPPED|FAILED|[0-9]+ (rewritten|copied))| {4}FAIL )' \
                artifacts/r2-cutover-remediate.log || echo "(no mutations performed)"
              echo '```'
              echo ""
              echo '<details><summary>Full reconciler output</summary>'
              echo ''
              echo '```'
              cat artifacts/r2-cutover-remediate.log
              echo '```'
              echo ''
              echo '</details>'
            fi
            echo ""
            echo "**This workflow does NOT block deploys.** The read-only deploy gate (\`Pre-Deploy Storage Reconcile\`) is the source of truth for whether \`main\` is deployable. This job exists so routine \`MISSING-R2\` / \`LEGACY-host\` drift gets swept automatically instead of breaking the next deploy."
            echo ""
            echo "If this run exited non-zero AFTER remediation, the residual buckets are NOT mechanically fixable (e.g. \`MISSING-media\`, \`MISSING-photo\`, or \`SKIPPED\` non-rewritable shapes). See \`docs/developer/migration-from-replit.md\` → \"Pre-deploy storage reconcile gate\" for the manual triage runbook."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reconciler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-cutover-remediate-${{ github.run_id }}
          path: artifacts/r2-cutover-remediate.log
          retention-days: 30

      - name: Record sweep result for in-app dashboard (Task #528)
        # Upserts a row into `storage_drift_sweep_runs` so Admin →
        # Observability can render the last sweep timestamp + headline
        # counts without operators having to leave the app to read this
        # job summary. Runs `if: always()` so a non-zero reconciler exit
        # still records the row — `exitCode` + `status` are how the
        # in-app panel knows the sweep failed. Best-effort: if the
        # upsert itself fails (Postgres unreachable, etc.), the workflow
        # continues so the existing GitHub job summary + artifact log
        # remain the audit trail.
        if: always()
        env:
          RECONCILER_LOG_PATH: artifacts/r2-cutover-remediate.log
          RECONCILER_EXIT_CODE: ${{ steps.remediate.outputs.exit_code }}
          TRIGGER_REASON: ${{ github.event.inputs.reason }}
        continue-on-error: true
        run: |
          if [ -z "${RECONCILER_EXIT_CODE}" ]; then
            echo "::warning::Reconciler exit code was not captured — skipping in-app dashboard upsert."
            exit 0
          fi
          npx tsx script/record-storage-drift-sweep.ts

      - name: Re-assert reconciler exit code
        # The `tee | exit_code=PIPESTATUS` pattern above swallows the exit
        # code so the summary step always runs. Re-assert it here so the
        # workflow run itself goes red whenever the reconciler did, which
        # is what surfaces a "needs operator attention" signal in the
        # GitHub Actions UI and email digest.
        if: always()
        run: |
          code="${{ steps.remediate.outputs.exit_code }}"
          if [ -z "$code" ]; then
            echo "::error::Reconciler exit code was not captured."
            exit 1
          fi
          if [ "$code" != "0" ]; then
            echo "::warning::Reconciler exited $code — residual unresolved references remain after auto-remediation. See job summary for the manual triage."
            exit "$code"
          fi

      - name: Alert on consecutive scheduled failures
        # Only escalate when:
        #   1. THIS run is failing (the re-assert step above just exited
        #      non-zero, so `failure()` is true), AND
        #   2. it's a scheduled run — manual `workflow_dispatch` is usually
        #      an operator already mid-triage; we don't want to file a
        #      ticket on top of their own debugging session.
        # The `if` short-circuits both conditions so we never page on a
        # one-off red night, only on a 2+ night backlog.
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Pull the most recent completed scheduled runs of THIS workflow
            // so we can count consecutive failures going backwards from the
            // present. The current run is still in-flight (this step runs
            // before the run conclusion is recorded) so it won't appear in
            // the list — count it as failure #1 explicitly.
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'storage-reconcile-remediate.yml',
              event: 'schedule',
              status: 'completed',
              per_page: 10,
            });

            let consecutive = 1; // current (in-flight) failing run
            for (const run of workflow_runs) {
              if (run.id === context.runId) continue;
              if (run.conclusion === 'failure') {
                consecutive++;
              } else {
                break;
              }
            }

            // Single red night is expected (legacy bucket can have transient
            // 5xx hiccups, a row gets deleted between scan and copy, etc.).
            // Two in a row means the residual buckets aren't draining.
            if (consecutive < 2) {
              core.info(`Only ${consecutive} consecutive scheduled failure(s); not alerting yet.`);
              return;
            }

            // Pull the terminal bucket counts straight from the reconciler
            // log so the alert tells the operator WHAT is residual, not
            // just THAT something is residual. We grab the LAST `OK` line
            // (i.e. the [RE-VERIFY] pass) and the four count lines that
            // follow it, matching the script's print order in
            // `script/r2-cutover-reconcile.ts` lines 383-387.
            let countsBlock = '(counts unavailable — reconciler log missing)';
            try {
              const log = fs.readFileSync('artifacts/r2-cutover-remediate.log', 'utf8');
              const lines = log.split('\n');
              let lastOkIdx = -1;
              for (let i = lines.length - 1; i >= 0; i--) {
                if (/^ {6}OK\s+:/.test(lines[i])) { lastOkIdx = i; break; }
              }
              if (lastOkIdx >= 0) {
                countsBlock = lines.slice(lastOkIdx, lastOkIdx + 5).join('\n');
              }
            } catch (e) {
              core.warning(`Failed to read reconciler log for counts: ${e.message}`);
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ALERT_LABEL = 'storage-drift-sweep-alert';

            // Ensure the label exists (idempotent). Swallow the 422 we get
            // when it already does — we don't care which run created it.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: ALERT_LABEL,
                color: 'B60205',
                description: 'Storage drift auto-remediation sweep has been red for 2+ consecutive nights',
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // We use a single tracking issue keyed off the label, not a
            // fresh issue per failure — otherwise the inbox fills up with
            // duplicates while the underlying backlog (the same handful of
            // MISSING-media rows) sits unfixed.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ALERT_LABEL,
              state: 'open',
              per_page: 5,
            });

            const title = `Storage drift sweep failing for ${consecutive} consecutive nights`;
            const body = [
              `The nightly storage drift sweep (\`.github/workflows/storage-reconcile-remediate.yml\`) has now exited non-zero on **${consecutive} consecutive scheduled runs**. Residual unfixable references (\`MISSING-media\`, \`MISSING-photo\`, or non-rewritable \`SKIPPED\` shapes) are accumulating without being triaged.`,
              ``,
              `**Failing run:** ${runUrl}`,
              ``,
              `**Residual bucket counts (from the [RE-VERIFY] pass of this run):**`,
              '',
              '```',
              countsBlock,
              '```',
              ``,
              `This does **not** block deploys — the read-only \`Pre-Deploy Storage Reconcile\` gate is the source of truth for whether \`main\` is deployable, and it will trip on its own if any of these residual rows ever turn into deploy-blocking shapes. But the backlog grows every night this stays red.`,
              ``,
              `See \`docs/developer/migration-from-replit.md\` → "Auto-remediation sweep (Task #523)" for the manual triage runbook.`,
              ``,
              `_This issue auto-closes the next time the scheduled sweep exits 0._`,
            ].join('\n');

            if (existing.length > 0) {
              // Update the existing issue's title (the consecutive count
              // changed) and append a comment with this run's link + counts
              // so the timeline shows the trajectory.
              const issue = existing[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              core.notice(`Updated existing alert issue #${issue.number} (${consecutive} consecutive failures).`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [ALERT_LABEL],
              });
              core.notice(`Opened alert issue #${created.number} (${consecutive} consecutive failures).`);
            }

      - name: Auto-resolve alert issue on green run
        # Mirror of the alert step: when a scheduled run goes green, close
        # any open tracking issue so the next failure starts a fresh
        # streak and the inbox doesn't carry stale alerts. Uses
        # `if: success()` so it only runs when every prior step succeeded
        # (which means the re-assert step above accepted exit code 0).
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const ALERT_LABEL = 'storage-drift-sweep-alert';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ALERT_LABEL,
              state: 'open',
              per_page: 10,
            });
            if (existing.length === 0) {
              core.info('No open alert issue to auto-resolve.');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Auto-resolved: scheduled storage drift sweep exited 0 on ${runUrl}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.notice(`Auto-resolved alert issue #${issue.number}.`);
            }
