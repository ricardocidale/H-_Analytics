name: Storage Drift Sweep — Reconcile & Remediate

on:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: ""

jobs:
  reconcile-and-remediate:
    name: Run reconciler then record result
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: artifacts/api-server/script/r2-cutover-reconcile.ts is the
      # expected reconciler path. Creating that script is tracked separately
      # (Task #868). Until it exists this step will fail with file-not-found,
      # but the "Record sweep result" step below will still run (if: always())
      # and will record an error status so the Observability panel stays
      # up-to-date rather than going stale.
      - name: Run reconciler (with remediation)
        id: reconcile
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          pnpm --filter @workspace/api-server exec tsx ./script/r2-cutover-reconcile.ts \
            --remediate-missing \
            --remediate-legacy \
            2>&1 | tee /tmp/reconciler.log
          RECONCILER_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${RECONCILER_EXIT}" >> "$GITHUB_OUTPUT"
          exit "${RECONCILER_EXIT}"

      - name: Record sweep result
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXIT_CODE: ${{ steps.reconcile.outputs.exit_code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_REASON: ${{ github.event.inputs.reason }}
        run: |
          pnpm --filter @workspace/scripts run record-storage-drift-sweep \
            --log-file /tmp/reconciler.log

      - name: Upload reconciler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconciler-log-${{ github.run_id }}
          path: /tmp/reconciler.log
          retention-days: 30
